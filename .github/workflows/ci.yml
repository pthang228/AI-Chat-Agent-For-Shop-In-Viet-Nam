name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
          API_AUTH_GUARD: "1"
        run: python tests/run_all.py

  smoke-import:
    name: Import + backup smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Byte-compile toàn bộ app/
        run: python -m compileall -q app
      - name: Smoke backup script (DB tạo tự động)
        env:
          PYTHONUTF8: "1"
        run: |
          python -c "from app.core.db import get_db; get_db()"
          python scripts/backup_db.py "$RUNNER_TEMP/bk"
