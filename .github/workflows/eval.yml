# EVAL LLM THẬT — GATE PR (không chỉ nightly). Chấm analyze_message trên đường
# production với DeepSeek thật (golden 50 câu tiếng Việt, tests/golden/) — chặn
# MERGE khi prompt/model drift (intent/chốt-đơn/bóc-ngày tụt, hoặc reply lộ JSON).
# Cần secret DEEPSEEK_API_KEY. Chi phí ~<$0.02 + ~1' mỗi PR.
#
# LƯU Ý branch-protection: nếu đặt job này là REQUIRED check thì để trigger
# pull_request KHÔNG path-filter (chạy mọi PR) — path-filter + required check
# sẽ kẹt "pending" ở PR không đụng file lọc. Fork PR (không có secret) → script
# tự exit 0 (skip), check vẫn xanh (GitHub không chia secret cho fork).
name: Eval LLM

on:
  pull_request:             # GATE PR trước khi merge
  push:
    branches: [main]        # lưới an toàn cho push thẳng main
  schedule:
    - cron: "0 19 * * *"    # 19:00 UTC = 2h sáng VN (bắt drift do nhà cung cấp đổi model)
  workflow_dispatch: {}     # chạy tay khi vừa sửa prompt

jobs:
  eval:
    runs-on: ubuntu-latest
    # Không có secret (fork PR) → job vẫn xanh: script tự exit 0 khi thiếu key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Chạy eval LLM thật (gate intent + booking + date + leak + error-rate)
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          EVAL_REPORT: eval_report.json
        run: >
          python scripts/eval_llm_real.py
          --min-intent 0.70 --min-booking 0.80 --min-date 0.70 --max-error-rate 0.20
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: eval_report.json
          if-no-files-found: ignore
